name: Update Stats & Deploy

on:
  schedule:
    - cron: '17 6 * * *'  # 6:17 UTC daily (~2:17am ET)
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'favicon.svg'
      - 'assets/**'
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute stats
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/update_stats.sh
          bash scripts/update_stats.sh index.html

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No stats changes"
          else
            git commit -m "Update daily stats"
            git push
          fi

      - name: Deploy to DreamHost
        env:
          DEPLOY_KEY: ${{ secrets.DOCKLABS_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H vps27408.dreamhostps.com >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'scripts' \
            --exclude 'README.md' \
            --exclude 'django' \
            --exclude 'keel' \
            --exclude 'pyproject.toml' \
            --exclude 'ui' \
            ./ docklabs_user@vps27408.dreamhostps.com:/home/docklabs_user/docklabs.ai/
